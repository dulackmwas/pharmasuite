<!DOCTYPE html>
<html>
<head>
    <title>Receipt Print</title>
    <style>
        @media print {
            body { margin: 0; padding: 5mm; }
            .receipt { font-family: monospace; font-size: 10px; line-height: 1.2; }
        }
        body { margin: 0; padding: 20px; background: #f5f5f5; }
        .receipt { font-family: monospace; font-size: 10px; line-height: 1.2; max-width: 300px; margin: 0 auto; background: white; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="receipt">
        {{ receipt_content|safe }}
    </div>

    <script>
        // Auto-print when loaded
        window.onload = function() {
            window.print();
        }

        // Close window after printing (for popup windows)
        window.onafterprint = function() {
            window.close();
        }
    </script>
</body>
</html>
